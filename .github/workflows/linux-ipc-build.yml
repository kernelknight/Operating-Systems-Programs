name: Linux IPC build

on:
  push:
  pull_request:

jobs:
  build-and-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build all programs
        run: make

      - name: Run curated demos
        run: make demo
